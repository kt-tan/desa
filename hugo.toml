baseURL = "https://desassossego.net/"
languageCode = "zh-tw"
title = "dessassossego"
theme = "PaperMod"
canonifyURLs = true
paginate = 5

[Params]
  assets.favicon = "/favicon.svg"
  description = "bông-bông-biáu-biáu"
  defaultTheme = "auto"
  ShowReadingTime = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"

[[menus.main]]
  name = "search"
  url = "/search/"
  weight = 0

[[menus.main]]
  name = "categories"
  url = "/categories/"
  weight = 1

[[menus.main]]
  name = "archive"
  url = "/archive/"
  weight = 2
